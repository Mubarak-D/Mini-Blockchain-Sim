<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCoin Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Mini<span class="neon-text">Coin</span></h1>
            <p>Cryptocurrency & Blockchain Simulator</p>
        </header>

        <div class="grid-layout">
            <!-- Left Column: Actions -->
            <div class="left-panel">
                <!-- Wallet Generator -->
                <section class="card glass">
                    <h2>Wallet Generator</h2>
                    <button id="generateWalletBtn" class="btn primary">Generate Key Pair</button>
                    <div class="input-group">
                        <label>Public Key (Address)</label>
                        <input type="text" id="publicKey" readonly placeholder="Click generate...">
                    </div>
                    <div class="input-group">
                        <label>Private Key</label>
                        <input type="password" id="privateKey" readonly placeholder="Click generate...">
                    </div>
                    <div class="input-group">
                        <label>Balance</label>
                        <div class="balance-display" id="walletBalance">0 MC</div>
                    </div>
                </section>

                <!-- Make Transaction -->
                <section class="card glass">
                    <h2>Send Transaction</h2>
                    <div class="input-group">
                        <label>From Address</label>
                        <input type="text" id="txFrom" placeholder="Sender public key">
                    </div>
                    <div class="input-group">
                        <label>To Address</label>
                        <input type="text" id="txTo" placeholder="Recipient public key">
                    </div>
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="number" id="txAmount" placeholder="0.00">
                    </div>
                    <button id="sendTxBtn" class="btn">Send to Mempool</button>
                </section>

                <!-- Mempool & Mining -->
                <section class="card glass">
                    <h2>Mempool & Miner</h2>
                    <p>Pending Transactions: <span id="pendingCount" class="neon-text">0</span></p>
                    <div class="input-group">
                        <label>Miner Reward Address</label>
                        <input type="text" id="mineRewardAddress" placeholder="Your public key">
                    </div>
                    <button id="mineBtn" class="btn primary glow">Mine Block</button>
                </section>
                
                <!-- Admin / Tools -->
                <section class="card glass">
                    <h2>Admin Tools</h2>
                    <div class="flex-buttons">
                        <button id="validateBtn" class="btn">Validate Chain</button>
                        <button id="tamperBtn" class="btn danger">Tamper Block 1</button>
                    </div>
                    <div id="validationResult" class="status-indicator"></div>
                </section>
            </div>

            <!-- Right Column: Blockchain Explorer -->
            <div class="right-panel">
                <section class="card glass full-height">
                    <h2>Blockchain Explorer</h2>
                    <div class="chain-container" id="blockchainDisplay">
                        <!-- Blocks will be injected here -->
                        <div class="loader">Loading chain...</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
